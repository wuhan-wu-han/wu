# ============================================================
# 默认使用 H2 内存库（开发/演示）。生产切换到 MySQL：
#   mvn spring-boot:run -Dspring-boot.run.profiles=mysql
# ============================================================
spring:
  profiles:
    active: h2

  jpa:
    hibernate:
      ddl-auto: update      # 生产用 update，演示可改 create
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# 排程引擎配置
schedule:
  max-tables: 8
  min-rest-rounds: 1

---
# H2 内存库（默认）
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:wu_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

---
# MySQL 生产库
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: jdbc:mysql://localhost:3306/wu_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
